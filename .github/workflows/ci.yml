name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & metadata check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Verify entry point is declared
        run: |
          python - <<'PY'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          eps = data["project"]["entry-points"]["vllm.general_plugins"]
          assert eps.get("gemma4_hetero_attn") == "vllm_gemma4_hetero_attn:register", eps
          print("entry point OK:", eps)
          PY
